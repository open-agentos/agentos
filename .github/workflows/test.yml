name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest
      - name: Check template-tree sync (templates/ == bootstrap/templates/)
        run: |
          # templates/ and bootstrap/templates/ must stay identical.
          # Drift between them was the root cause of the v1.2.1 patch (ba0e17c)
          # and F9.1 in the v1.2.2 fix spec. This check retires the class.
          if ! diff -rq templates/ bootstrap/templates/ > /dev/null 2>&1; then
            echo "ERROR: templates/ and bootstrap/templates/ have drifted."
            diff -rq templates/ bootstrap/templates/
            exit 1
          fi
          echo "OK: templates/ and bootstrap/templates/ are identical."
      - name: Check runner prerequisites (F9.4)
        run: python3 scripts/check_runner_prereqs.py
      - name: Check install version references (v1.2.3 #35)
        run: python3 scripts/check_version_refs.py
      - name: Audit status:* label writes for bare GITHUB_TOKEN (F11.3)
        run: python3 scripts/audit_token_writes.py
